<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>A B Rehab | DocuLedger Tour</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
.screen{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available;background:linear-gradient(165deg,#f0fdfa 0%,#eef6ff 50%,#fdf4ff 100%)}

.hdr{flex-shrink:0;background:linear-gradient(120deg,#0ea5e9,#06b6d4);padding:8px 12px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 10px rgba(14,165,233,.25)}
.hdr-left{display:flex;align-items:center;gap:8px}
.hdr-logo{width:36px;height:auto;flex-shrink:0}
.brand{font-size:13px;font-weight:800;color:#fff;letter-spacing:.2px}
.sub{font-size:9px;color:#e0f7ff;margin-top:1px}
.badge{background:#fff;color:#0891b2;font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;box-shadow:0 1px 4px rgba(0,0,0,.12)}

.phase{flex-shrink:0;padding:5px 12px;font-size:10.5px;font-weight:800;letter-spacing:.4px;text-align:center}
.p1{background:#d1fae5;color:#047857}
.p2{background:#dbeafe;color:#1d4ed8}
.pb{background:#fef3c7;color:#b45309}

.main{display:flex;flex:1;min-height:0;overflow:hidden;padding:6px 6px 0;gap:6px}

.img-col{display:flex;flex-direction:column;width:38%;flex-shrink:0;background:#f0f9ff;border-radius:14px;border:1px solid #cfeaf5;overflow:hidden;box-shadow:0 2px 10px rgba(14,165,233,.1)}

.img-area{display:flex;align-items:stretch;flex:1;min-height:0}
.arrow-btn{width:24px;min-width:24px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation;-webkit-appearance:none;transition:background .12s}
.arrow-btn:active{background:#dbeefe}
.arrow-btn:disabled{opacity:.2}
.arrow-btn svg{width:16px;height:16px;color:#0891b2}

.img-frame{flex:1;min-width:0;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:3px}
.white-bg{background:linear-gradient(160deg,#f0fdfa,#e6f7fb)}
.peach-bg{background:linear-gradient(160deg,#fffbeb,#fef3c7)}
.img-frame img{max-width:100%;max-height:100%;width:auto;height:auto;display:block;object-fit:contain;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.1)}
.img-loading{color:#7aa3b5;font-size:10px;text-align:center;padding:20px;width:100%}

.nar-panel{flex:1;min-width:0;display:flex;flex-direction:column;background:#f3edfb;border-radius:14px;border:1px solid #ddd0f2;overflow:hidden;box-shadow:0 2px 10px rgba(124,58,237,.1)}

.nar-head{flex-shrink:0;padding:12px 16px 10px;border-bottom:2px solid #e4d6f7;background:linear-gradient(160deg,#f3edfb,#ece0fa)}
.step-badge{display:inline-flex;align-items:center;gap:6px;margin-bottom:5px}
.step-dot{width:8px;height:8px;border-radius:50%;background:#0ea5e9;flex-shrink:0}
.step-num{font-size:11px;font-weight:800;color:#0891b2;letter-spacing:.4px;text-transform:uppercase}
.step-title{font-size:17px;font-weight:800;color:#1e293b;line-height:1.3}

.nar-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px;background:linear-gradient(180deg,#f3edfb,#eee3fa)}
.nar-lbl{font-size:10.5px;font-weight:800;color:#0891b2;letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.nar-lbl::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,#bae6fd,transparent)}
.nar-txt{font-size:16px;line-height:1.75;color:#334155;font-weight:450}

.bot{flex-shrink:0;padding:9px 14px 11px}
.bot-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.play-btn{width:36px;height:36px;min-width:36px;border-radius:50%;border:none;background:linear-gradient(135deg,#0ea5e9,#06b6d4);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;flex-shrink:0;box-shadow:0 2px 8px rgba(14,165,233,.35)}
.play-btn.on{background:linear-gradient(135deg,#f59e0b,#f97316)}
.prog-col{flex:1}
.prog-track{height:5px;background:#dbe7ef;border-radius:99px;overflow:hidden;margin-bottom:6px}
.prog-fill{height:100%;background:linear-gradient(90deg,#0ea5e9,#06b6d4,#a78bfa);border-radius:99px;transition:width .35s ease}
.dots{display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;cursor:pointer;flex-shrink:0;transition:all .2s;touch-action:manipulation}
.s1{background:#bbf7d0}.s1.done{background:#22c55e}.s1.active{background:#047857;transform:scale(1.5);box-shadow:0 0 6px #22c55e}
.s2{background:#bfdbfe}.s2.done{background:#3b82f6}.s2.active{background:#1d4ed8;transform:scale(1.5);box-shadow:0 0 6px #3b82f6}
.s3{background:#fde68a}.s3.done{background:#f59e0b}.s3.active{background:#b45309;transform:scale(1.5);box-shadow:0 0 6px #f59e0b}
.sep{width:2px;height:8px;background:#cbd5e1;margin:0 2px;border-radius:1px}
.hint{font-size:9px;color:#94a3b8;text-align:center;margin-top:5px}
</style>
</head>

    var d=document.createElement('div');
    d.className='dot '+cls(idx);
    d.addEventListener('click',function(){stopPlay();cur=idx;render();});
    dr.appendChild(d);
  })(i);
}

var tx=0,ty=0;
var ia=document.querySelector('.img-area');
ia.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
ia.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){stopPlay();dx<0?goNext():goPrev();}
},{passive:true});

render();
</script>
</body>
</html>
