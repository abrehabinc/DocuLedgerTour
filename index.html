<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>AB Rehab | DocuLedger Tour</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#071420;color:#fff;font-family:-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%;overflow:hidden}
.screen{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available}
.hdr{background:#071420;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-bottom:1px solid #1a3a5c}
.brand{font-size:13px;font-weight:700;color:#00c9a7}
.sub{font-size:10px;color:#7aa8c4;margin-top:1px}
.step-badge{background:#00c9a7;color:#071420;font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px}
.phase-bar{padding:4px 12px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;text-align:center;flex-shrink:0}
.p1{background:#0a3d26;color:#4ade80}
.p2{background:#0a2540;color:#38bdf8}
.pb{background:#2a1a00;color:#fbbf24}
.main-row{display:flex;flex:1;min-height:0;overflow:hidden}
.img-col{display:flex;flex-direction:column;flex:1;min-width:0;background:#071420}
.img-area{display:flex;align-items:center;flex:1;min-height:0}
.side-btn{width:36px;min-width:36px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;-webkit-appearance:none;align-self:stretch;flex-shrink:0}
.side-btn:active{background:rgba(0,201,167,.12)}
.side-btn:disabled{opacity:.15;cursor:default}
.side-btn svg{width:22px;height:22px;color:#00c9a7}
.img-wrap{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;background:#071420;border-radius:8px;overflow:hidden;margin:4px 0}
.img-wrap img{width:100%;height:auto;display:block;object-fit:contain;max-height:100%}
.img-wrap img.on-white{background:#fff}
.img-loading{color:#aaa;font-size:11px;text-align:center;padding:20px;width:100%}
.divider{width:1px;background:#1a3a5c;flex-shrink:0}
.nar-col{width:42%;min-width:130px;max-width:200px;display:flex;flex-direction:column;background:#0d2137;flex-shrink:0}
.nar-title{padding:8px 10px 6px;border-bottom:1px solid #1a3a5c;flex-shrink:0}
.nar-step{font-size:11px;font-weight:800;color:#00c9a7;margin-bottom:3px}
.nar-heading{font-size:12px;font-weight:700;color:#fff;line-height:1.3}
.nar-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 10px}
.nar-label{font-size:9px;font-weight:700;color:#00c9a7;letter-spacing:.6px;text-transform:uppercase;margin-bottom:5px}
.nar-text{font-size:11px;line-height:1.6;color:#c0d8ee}
.bot{flex-shrink:0;background:#071420;border-top:1px solid #1a3a5c;padding:7px 12px 9px}
.bot-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.play-btn{width:36px;height:36px;border-radius:50%;background:#00c9a7;border:none;color:#071420;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;flex-shrink:0}
.play-btn.on{background:#0ea5e9}
.play-btn:active{opacity:.8}
.prog-wrap{flex:1}
.prog-track{height:3px;background:#1a3a5c;border-radius:2px;overflow:hidden;margin-bottom:5px}
.prog-fill{height:100%;background:linear-gradient(90deg,#00c9a7,#0ea5e9);border-radius:2px;transition:width .3s}
.dots-row{display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:#1a3a5c;cursor:pointer;flex-shrink:0;transition:all .2s;touch-action:manipulation}
.dot.done{background:#2a5a50}
.dot.active{background:#00c9a7;transform:scale(1.4)}
.dot.v.done{background:#1a3a60}
.dot.v.active{background:#0ea5e9;transform:scale(1.4)}
.dot.b.done{background:#3a2a00}
.dot.b.active{background:#fbbf24;transform:scale(1.4)}
.sep{width:1px;height:7px;background:#1a3a5c;margin:0 1px}
.hint{font-size:9px;color:#3a5a72;text-align:center;margin-top:5px}
</style>
</head>

var TOTAL = 20;
var SETUP = 8, VISIT = 15;
var DELAY = 7000;
var cur = 0, playing = false, timer = null;

function render() {
  var s = S[cur];
  document.getElementById('stepBadge').textContent = (cur+1) + ' / ' + TOTAL;
  document.getElementById('narStep').textContent = 'Step ' + (cur+1);
  document.getElementById('narHeading').textContent = s.title;
  document.getElementById('narText').textContent = s.narration;
  document.getElementById('progFill').style.width = (((cur+1)/TOTAL)*100) + '%';
  document.getElementById('btnPrev').disabled = (cur === 0);
  document.querySelector('.nar-body').scrollTop = 0;

  var pb = document.getElementById('pbar');
  if (s.phase.indexOf('BONUS') !== -1) {
    pb.className = 'phase-bar pb';
    pb.innerHTML = '&#11088; Bonus &mdash; Save DocuLedger as App on iPhone &amp; Android';
  } else if (s.phase.indexOf('PART 2') !== -1) {
    pb.className = 'phase-bar p2';
    pb.innerHTML = '&#9654; Part 2 &mdash; Every Visit';
  } else {
    pb.className = 'phase-bar p1';
    pb.innerHTML = '&#9654; Part 1 &mdash; One-Time Setup';
  }

  var iw = document.getElementById('imgWrap');
  var isBonus = s.phase.indexOf('BONUS') !== -1;
  iw.style.background = isBonus ? '#071420' : '#fff';
  iw.innerHTML = '<div class="img-loading">Loading...</div>';
  var img = new Image();
  img.style.cssText = 'width:100%;height:auto;display:block;object-fit:contain;max-height:100%;';
  img.alt = s.title;
  img.onload = function(){ iw.innerHTML = ''; iw.appendChild(img); };
  img.onerror = function(){ iw.innerHTML = '<div class="img-loading">Tap arrow to continue</div>'; };
  img.src = s.img;

  var dots = document.querySelectorAll('.dot');
  for (var i = 0; i < dots.length; i++) {
    var cls = 'dot';
    if (i >= VISIT) cls += ' b';
    else if (i >= SETUP) cls += ' v';
    dots[i].className = cls + (i === cur ? ' active' : i < cur ? ' done' : '');
  }
}

function goNext() { if (cur < TOTAL-1) { cur++; render(); } else { cur=0; stopPlay(); render(); } }
function goPrev() { if (cur > 0) { cur--; render(); } }
function startPlay() {
  playing = true;
  document.getElementById('playBtn').innerHTML = '&#9646;&#9646;';
  document.getElementById('playBtn').classList.add('on');
  document.getElementById('hint').textContent = 'Auto-playing — tap pause to stop';
  timer = setInterval(function(){ if(cur<TOTAL-1){cur++;render();}else stopPlay(); }, DELAY);
}
function stopPlay() {
  playing = false; clearInterval(timer);
  document.getElementById('playBtn').innerHTML = '&#9654;';
  document.getElementById('playBtn').classList.remove('on');
  document.getElementById('hint').textContent = 'Tap ▶ to auto-play · Tap arrows or swipe to navigate';
}
function togglePlay() { playing ? stopPlay() : startPlay(); }

document.getElementById('btnNext').addEventListener('click', function(){ stopPlay(); goNext(); });
document.getElementById('btnPrev').addEventListener('click', function(){ stopPlay(); goPrev(); });
document.getElementById('playBtn').addEventListener('click', togglePlay);

var dr = document.getElementById('dotsRow');
for (var i = 0; i < TOTAL; i++) {
  if (i === SETUP || i === VISIT) { var sp = document.createElement('div'); sp.className='sep'; dr.appendChild(sp); }
  (function(idx) {
    var d = document.createElement('div');
    d.className = 'dot' + (idx>=VISIT?' b':idx>=SETUP?' v':'');
    d.addEventListener('click', function(){ stopPlay(); cur=idx; render(); });
    dr.appendChild(d);
  })(i);
}

var tx=0, ty=0;
document.querySelector('.img-area').addEventListener('touchstart',function(e){tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.querySelector('.img-area').addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){stopPlay();dx<0?goNext():goPrev();}
},{passive:true});

render();
</script>
